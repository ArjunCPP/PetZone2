<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2ac0ac",
                        "secondary": "#f97316", // Orange for the Book Now button as requested
                        "background-light": "#f6f8f8",
                        "background-dark": "#12201e",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>PawBook - Home</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Top Bar -->
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 sticky top-0 z-20 justify-between border-b border-primary/10">
<div class="flex size-10 shrink-0 items-center">
<div class="bg-primary/20 bg-center bg-no-repeat aspect-square bg-cover rounded-full size-10 flex items-center justify-center overflow-hidden border-2 border-primary" data-alt="User profile avatar smiling person">
<img alt="Avatar" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAJGpzjoPij9Xl6YJqNIYScEmOtrt2a5lR_5Q9-3TbgvtJEI6j9yfh05-kHJFWETYDDChxHi51wUnn23GCk1sQbxGGuqZy_ddOAayotANWqy2S_2UnjEhTEnbdRwVdYndu9JYRbtIUmvXvDnp4XkV0Gkhg1MDKhtRQi45j2wyy4KrX3RcJ5aS8F_3zOQoebju2OupEwSgN_iqJ-BDTXa5rVuSobgWs6s9rpAZgx_BM7CaA9LtajsVDxqrxCNSiEq8CDyF0Sn0xbXQIj"/>
</div>
</div>
<div class="flex flex-col items-center">
<h1 class="text-primary text-xl font-bold leading-tight tracking-tight">PawBook</h1>
</div>
<div class="flex w-10 items-center justify-end">
<button class="flex size-10 cursor-pointer items-center justify-center rounded-full bg-primary/10 text-primary hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">notifications</span>
</button>
</div>
</header>
<!-- Location Bar -->
<div class="flex items-center gap-3 bg-background-light dark:bg-background-dark px-4 py-3 justify-between">
<div class="flex items-center gap-2 overflow-hidden">
<div class="text-primary flex items-center justify-center rounded-lg bg-primary/10 shrink-0 size-8">
<span class="material-symbols-outlined text-sm">location_on</span>
</div>
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium truncate" data-location="Kochi, India">Ernakulam, Kochi</p>
</div>
<button class="shrink-0 text-primary hover:bg-primary/10 p-1 rounded-md transition-colors">
<span class="material-symbols-outlined text-xl">edit</span>
</button>
</div>
<!-- Range Selector & Search -->
<div class="px-4 py-2 flex flex-col gap-3">
<div class="flex">
<button class="flex h-8 items-center justify-center gap-x-2 rounded-full bg-primary px-4 text-white shadow-sm shadow-primary/20">
<span class="text-xs font-semibold">Within 5 km</span>
<span class="material-symbols-outlined text-sm">keyboard_arrow_down</span>
</button>
</div>
<label class="flex flex-col w-full">
<div class="flex w-full items-stretch rounded-xl h-12 bg-white dark:bg-slate-800 border border-primary/20 shadow-sm">
<div class="text-primary flex items-center justify-center pl-4">
<span class="material-symbols-outlined">search</span>
</div>
<input class="w-full border-none bg-transparent focus:ring-0 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 px-3 text-sm font-medium" placeholder="Search pet grooming shops..."/>
</div>
</label>
</div>
<!-- Section: Shops Near You -->
<main class="flex-1 px-4 py-6 flex flex-col gap-6 pb-24">
<div class="flex items-center justify-between">
<h2 class="text-lg font-bold text-slate-900 dark:text-slate-100">Shops Near You</h2>
<button class="text-primary text-sm font-semibold">See All</button>
</div>
<!-- Shop Card 1 -->
<div class="bg-white dark:bg-slate-800 rounded-xl overflow-hidden shadow-md border border-slate-100 dark:border-slate-700 flex flex-col">
<div class="relative h-48 w-full bg-slate-200" data-alt="Modern pet grooming salon interior with grooming tools">
<img alt="Grooming Shop" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDEkrEXFuSoShW5wVHfpT48ypvDWwqD_DK7z_lKDNY7_WczZxVzGjq0XxhCThxuCODg_uJQs0bYy8cI8jGwt2PbaCRZBwhp0yvCvn59eoJvny_CVueI4zGtOMUL_nO7aEDiNNTeUNyUei02i6pPQ835gD0Yh6QbyPPsRp8bMoV7m5WxPhQRqqe4rEMs-Jl1mpWspejEvl355sJbFp5PQsEhV1MQbi1EIIi0WEX194zUXAIcNFqf6_NzKW8NSAZSaBvLlx3Vpnb_cfdG"/>
<div class="absolute top-3 right-3 bg-white/90 dark:bg-slate-900/90 backdrop-blur-sm px-2 py-1 rounded-lg flex items-center gap-1">
<span class="material-symbols-outlined text-yellow-500 text-sm fill-1">star</span>
<span class="text-xs font-bold">4.8</span>
</div>
</div>
<div class="p-4 flex flex-col gap-3">
<div class="flex justify-between items-start">
<div>
<h3 class="font-bold text-base text-slate-900 dark:text-slate-100">Paws &amp; Claws Grooming</h3>
<div class="flex items-center gap-1 text-slate-500 dark:text-slate-400 mt-1">
<span class="material-symbols-outlined text-sm">near_me</span>
<span class="text-xs">2.3 km away</span>
</div>
</div>
<div class="flex gap-1">
<span class="px-2 py-0.5 rounded bg-primary/10 text-primary text-[10px] font-bold uppercase tracking-wider">Dogs</span>
<span class="px-2 py-0.5 rounded bg-primary/10 text-primary text-[10px] font-bold uppercase tracking-wider">Cats</span>
</div>
</div>
<button class="w-full bg-secondary hover:bg-orange-600 text-white font-bold py-3 rounded-xl transition-colors shadow-lg shadow-orange-500/20 uppercase text-sm tracking-wide">
                        Book Now
                    </button>
</div>
</div>
<!-- Shop Card 2 -->
<div class="bg-white dark:bg-slate-800 rounded-xl overflow-hidden shadow-md border border-slate-100 dark:border-slate-700 flex flex-col">
<div class="relative h-48 w-full bg-slate-200" data-alt="Cute puppy being washed in a pet spa">
<img alt="Pet Spa" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDyLfkGq3oqCtLNgc0_VaigTsfz0sxIW-6qrRJ-U7id0RgnBesOeE7nC6xkg5VdFZzEKC0AfG67vR-uy6gGCsZbnoHycvh4x1Abmc0t_RLxz_u8T_9yDqe5AQeKsgsu71MQjIVa685Dvu5h4BQOoUtxsbA4jKYbWZuFF-wVNTDxenYRBElDFdkWy-CUmd-PPPA3uST4F42qoV0plwtJw0gngKXX4V-aFWm0h25VSwuwROj_7dHJYgtleSxeXzrA3hiCYAst8dC6mhMv"/>
<div class="absolute top-3 right-3 bg-white/90 dark:bg-slate-900/90 backdrop-blur-sm px-2 py-1 rounded-lg flex items-center gap-1">
<span class="material-symbols-outlined text-yellow-500 text-sm fill-1">star</span>
<span class="text-xs font-bold">4.9</span>
</div>
</div>
<div class="p-4 flex flex-col gap-3">
<div class="flex justify-between items-start">
<div>
<h3 class="font-bold text-base text-slate-900 dark:text-slate-100">The Fluffy Tail Spa</h3>
<div class="flex items-center gap-1 text-slate-500 dark:text-slate-400 mt-1">
<span class="material-symbols-outlined text-sm">near_me</span>
<span class="text-xs">3.1 km away</span>
</div>
</div>
<div class="flex gap-1">
<span class="px-2 py-0.5 rounded bg-primary/10 text-primary text-[10px] font-bold uppercase tracking-wider">Dogs</span>
</div>
</div>
<button class="w-full bg-secondary hover:bg-orange-600 text-white font-bold py-3 rounded-xl transition-colors shadow-lg shadow-orange-500/20 uppercase text-sm tracking-wide">
                        Book Now
                    </button>
</div>
</div>
</main>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-background-dark border-t border-slate-100 dark:border-slate-800 px-6 py-3 pb-6 flex items-center justify-between z-30">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined fill-1">home</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Home</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">calendar_today</span>
<span class="text-[10px] font-bold uppercase tracking-wider">My Bookings</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">local_offer</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Offers</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Profile</span>
</a>
</nav>
</div>
</body></html>
