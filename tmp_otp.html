<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OTP Verification - PawBook</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#FF6B35",
                "background-light": "#f6f8f8",
                "background-dark": "#12201e",
              },
              fontFamily: {
                "display": ["Plus Jakarta Sans"]
              },
              borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .otp-input:focus {
            border-color: #FF6B35;
            box-shadow: 0 0 0 2px rgba(255, 107, 53, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full max-w-md mx-auto flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Top App Bar -->
<div class="flex items-center p-4 pb-2 justify-between">
<button class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-slate-200/50 dark:hover:bg-slate-800/50 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">OTP Verification</h2>
</div>
<div class="flex flex-col px-6 pt-10">
<!-- Illustration / Icon Area -->
<div class="flex justify-center mb-8">
<div class="w-24 h-24 bg-primary/10 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-5xl">phonelink_lock</span>
</div>
</div>
<!-- Header Text -->
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-3xl font-extrabold leading-tight text-center mb-2">Verify Your Number</h1>
<p class="text-slate-500 dark:text-slate-400 text-base font-normal leading-normal text-center mb-10">
                Enter the 4-digit OTP sent to <span class="font-semibold text-slate-900 dark:text-slate-100">+91 XXXXXXXX</span>
</p>
<!-- OTP Inputs -->
<div class="flex justify-center gap-4 mb-8">
<input class="otp-input w-16 h-20 text-center text-3xl font-bold rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:outline-none transition-all" maxlength="1" type="text" value=""/>
<input class="otp-input w-16 h-20 text-center text-3xl font-bold rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:outline-none transition-all" maxlength="1" type="text" value=""/>
<input class="otp-input w-16 h-20 text-center text-3xl font-bold rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:outline-none transition-all" maxlength="1" type="text" value=""/>
<input class="otp-input w-16 h-20 text-center text-3xl font-bold rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:outline-none transition-all" maxlength="1" type="text" value=""/>
</div>
<!-- Timer Display -->
<div class="flex flex-col items-center gap-2 mb-10">
<div class="flex items-center gap-2 text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined text-sm">schedule</span>
<p class="text-sm font-medium">Resend in <span class="text-primary font-bold">0:45</span></p>
</div>
<button class="text-primary font-bold text-sm opacity-50 cursor-not-allowed">Resend OTP</button>
</div>
<!-- Verify Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/25 transition-all flex items-center justify-center gap-2">
<span>Verify &amp; Continue</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<!-- Keyboard Placeholder (Visual filler for mobile screen feel) -->
<div class="mt-auto pt-10 grid grid-cols-3 gap-1 opacity-20 pointer-events-none pb-4">
<div class="h-12 flex items-center justify-center text-xl font-bold">1</div>
<div class="h-12 flex items-center justify-center text-xl font-bold">2</div>
<div class="h-12 flex items-center justify-center text-xl font-bold">3</div>
<div class="h-12 flex items-center justify-center text-xl font-bold">4</div>
<div class="h-12 flex items-center justify-center text-xl font-bold">5</div>
<div class="h-12 flex items-center justify-center text-xl font-bold">6</div>
<div class="h-12 flex items-center justify-center text-xl font-bold">7</div>
<div class="h-12 flex items-center justify-center text-xl font-bold">8</div>
<div class="h-12 flex items-center justify-center text-xl font-bold">9</div>
<div></div>
<div class="h-12 flex items-center justify-center text-xl font-bold">0</div>
<div class="h-12 flex items-center justify-center text-xl font-bold"><span class="material-symbols-outlined">backspace</span></div>
</div>
</div>
</div>
</body></html>
