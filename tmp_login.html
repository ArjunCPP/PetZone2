<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PawBook - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF6B35",
                        "background-light": "#fefaf8",
                        "background-dark": "#1a120f",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .paw-pattern {
            background-color: transparent;
            background-image: radial-gradient(circle at 2px 2px, currentColor 1px, transparent 0);
            background-size: 24px 24px;
            opacity: 0.05;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex h-screen w-full flex-col overflow-x-hidden">
<!-- Background Pattern Overlay -->
<div class="absolute inset-0 paw-pattern pointer-events-none"></div>
<!-- Top Header Section -->
<div class="flex items-center p-6 justify-center relative z-10">
<div class="flex items-center gap-2">
<div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined text-2xl">pets</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight tracking-tight">PawBook</h2>
</div>
</div>
<!-- Main Content Wrapper -->
<div class="flex-1 flex flex-col justify-center px-6 max-w-md mx-auto w-full relative z-10">
<!-- Hero Image/Illustration Area -->
<div class="w-full mb-8">
<div class="aspect-square w-full max-w-[280px] mx-auto bg-primary/10 rounded-full flex items-center justify-center relative overflow-hidden">
<img alt="A happy dog being petted by its owner" class="w-full h-full object-cover rounded-full mix-blend-multiply opacity-80" data-alt="A happy dog being petted by its owner" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDPT2oJ4mn22zlw1rsHyTpK2IbaU4vwcOtEhSzaPdWTPJF_04B9QSNGJNExi_e4nNAsdf2EPWaHBGhEKbmOQoFcHD7r0gdM6HyRghfQCub3xvyEIVDu9pGwxPeY2Ei5U1xgw9iITgX9pSDHwLwXOiWmN6xgQdjNH-yxofI6zVnuFSOLVZ7jfcSTwWWM-Q1c2-eODrxxWWx2bz3_soes5umBJIvX3etWy3EUaCEX2VktHwKnfLyS4zZLebdih2jeOjw-gPBpC8o743eJ"/>
<!-- Abstract Overlay Shapes -->
<div class="absolute -top-4 -right-4 w-20 h-20 bg-primary/20 rounded-full blur-xl"></div>
<div class="absolute -bottom-4 -left-4 w-16 h-16 bg-primary/30 rounded-full blur-lg"></div>
</div>
</div>
<!-- Tagline -->
<div class="text-center mb-10">
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold leading-tight mb-2">Book. Groom. Love.</h1>
<p class="text-slate-500 dark:text-slate-400 text-lg">Enter your phone number to get started</p>
</div>
<!-- Login Form -->
<div class="space-y-6">
<div class="flex gap-3">
<!-- Country Selector -->
<div class="flex flex-col w-28">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold mb-2 ml-1">Country</label>
<div class="relative">
<select class="appearance-none w-full rounded-xl border-2 border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-4 h-14 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-0 font-medium">
<option>+91</option>
<option>+1</option>
<option>+44</option>
<option>+61</option>
</select>
<div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
<span class="material-symbols-outlined text-sm">keyboard_arrow_down</span>
</div>
</div>
</div>
<!-- Phone Input -->
<div class="flex flex-col flex-1">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold mb-2 ml-1">Phone Number</label>
<input class="w-full rounded-xl border-2 border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-4 h-14 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:border-primary focus:ring-0 font-medium" placeholder="98765 43210" type="tel"/>
</div>
</div>
<!-- CTA Button -->
<button class="w-full bg-primary hover:bg-orange-600 text-white font-bold h-14 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 group">
<span>Send OTP</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
<!-- Footer Info -->
<div class="mt-12 text-center">
<p class="text-slate-500 dark:text-slate-400 text-sm px-4">
                    By continuing, you agree to PawBook's 
                    <a class="text-primary font-semibold underline underline-offset-2" href="#">Terms of Service</a> &amp; 
                    <a class="text-primary font-semibold underline underline-offset-2" href="#">Privacy Policy</a>
</p>
</div>
</div>
<!-- Spacer for mobile view padding -->
<div class="h-10"></div>
</div>
</body></html>
